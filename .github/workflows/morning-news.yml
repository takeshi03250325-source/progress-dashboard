name: 朝ニュース取得と LINE プッシュ

on:
  workflow_dispatch:
  schedule:
    # 平日 6:30 JST = 前日 21:30 UTC（日〜木 UTC = 月〜金 JST の朝）
    - cron: "30 21 * * 0-4"

jobs:
  morning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: RSS 取得と X 投稿案の生成
        run: npm run morning:fetch

      - name: LINE にプッシュ
        run: npm run morning:line
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_PUSH_TO_USER_ID: ${{ secrets.LINE_PUSH_TO_USER_ID }}
