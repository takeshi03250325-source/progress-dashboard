# 朝のニュース取得元（RSS）
# 公式の配信URLを優先。各社の利用条件・転載可否はサイトの記載に従ってください。

feeds:
  # 日経クロステック（xTECH）— 公式 RSS 一覧: https://xtech.nikkei.com/atcl/nxt/info/18/00001/022300009/
  - name: 日経クロステック 土木
    url: https://xtech.nikkei.com/rss/xtech-con.rdf
    enabled: true
    weight: 1.2

  - name: 日経クロステック 建築・住宅
    url: https://xtech.nikkei.com/rss/xtech-bld.rdf
    enabled: true
    weight: 1.0

  # Google ニュース：「建設業 日本」で取得（建設より業界・労働市場の記事に寄りやすい）
  # 使うときは enabled: true に。日経と混ざるので weight で調整する
  - name: Googleニュース 建設業
    url: https://news.google.com/rss/search?q=%E5%BB%BA%E8%A8%AD%E6%A5%AD+%E6%97%A5%E6%9C%AC&hl=ja&gl=JP&ceid=JP:ja
    enabled: true
    weight: 0.9

  # 以前の動作確認用（オフにしておく。必要なら enabled: true に）
  - name: テスト用 TechCrunch
    url: https://techcrunch.com/feed/
    enabled: false
    weight: 1

# 日本向けに絞る（fetch-and-draft.mjs）
# japan_only_strict: 国内キーワード・都道府県名・trusted ホストのいずれかがない記事は除外
region:
  japan_focus: true
  japan_only_strict: true
  overseas_hint_substrings:
