    - ソウル市
    - ハノイ
    - ジャカルタ
    - バンコク
    - 上海市
    - 北京市
    - 深圳市
    - 台北市
    - ミャンマー
    - ベトナム
    - ベトナムの
    - ロンタイン
    - ロンタン
    - タイン国際空港
    - Vietnam.vn
    - Vietnam
    - カンボジア
    - ラオス
    - カンボジアの
    - ラオスの
    - シンガポール
    - マニラ
    - クアラルンプール
    - フィリピンの
    - インドネシアの
    - タイの首都
    - マレーシアの
    - ドバイ
    - カタール
    - サウジアラビア
    - ニューヨーク市
    - ロサンゼルス
    - ロンドン市
    # オーストラリア（経済指標・豪◯表記。単独「豪」は 豪雨 等に当たるため使わない）
    - オーストラリア
    - 豪州
    - 豪住宅
    - 豪建設
    - 豪不動産
    - 豪企業
    - 豪景気
    - 豪GDP
    - 豪CPI
    - 豪指標
    - 豪家計
    - 豪小売
    - 豪失業
    - 豪中銀
    - 豪準備銀行
    - 豪利上げ
    - 豪利下げ
    - 豪ドル
    - 豪金利
    - 豪政策
    - 豪首相
    - 豪政権
    - シドニー
    - メルボルン
    - ブリスベン
    - アデレード
    - パース
    - ケアンズ
  japan_keep_substrings:
    - 日本
    - 国内
    - 国土交通
    - 国交省
    - 東京
    - 大阪
    - 名古屋
    - 札幌
    - 福岡
    - 横浜
    - 神戸
    - 京都
    - 北海道
    - 沖縄
    - 都道府県
    - 地方自治体
    - ゼネコン
    - 日系
    - 国交
    - 再開発
    - 被災地
    - 防災
    - 新幹線
    - 高速道路
    - 国道
    - 整備計画
  # 海外ヒントと同時に出るだけでは「日本絡み」とみなさない（豪で受注、等を除外）
  japan_aux_keep_substrings:
    - 入札
    - 受注
    - 元請
    - 下請
  trusted_host_suffixes:
    - ".co.jp"
    - ".go.jp"
    - ".lg.jp"
    - ".ne.jp"
    - ".or.jp"
    - ".ac.jp"
    - "nikkei.com"
    - "news.yahoo.co.jp"

keywords:
  interest:
    - 建設業
    - 土木
    - 工事
    - インフラ
    - ゼネコン
    - 建築
    - 国交省
    - 入札
    - AI

max_age_hours: 48
# X 投稿案全体の目安（本文＋出典＋抜粋＋判定＋候補。長いほど NG 時の代替案に余裕あり）
x_post_max_chars: 1800

# X 投稿案：石男くん風の文案（Gemini / フォールバック）
# MAGAZINE_GEMINI_API_KEY があるとき、下記 prompt_file を使って生成。無いときはフォールバック文案。
# ishio_gemini は後方互換（false で LLM 無効）。ishio_llm でも可。
x_post:
  ishio_llm: true
  # LINE で並べて送る記事候補の数（1〜5。dedupe で足りない分はその時点の取得件数まで）
  pick_count: 3
  prompt_file: config/ai-prompts/morning-ishio-x-post.md

# 転載レベルの重複除外（過去に取り上げた URL / 同一内容の指紋を記録）
dedupe:
  enabled: true
  history_file: data/posted-articles.json
  max_entries: 400
